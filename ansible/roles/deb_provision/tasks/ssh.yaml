- name: Ensure SSH listens on all interfaces
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?ListenAddress'
    line: 'ListenAddress 0.0.0.0'
    create: yes

- name: Disable login from outside networks
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: 'PermitRootLogin no'

- name: Disable password authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication no'

- name: Disable challenge-response authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?ChallengeResponseAuthentication'
    line: 'ChallengeResponseAuthentication no'

- name: Ensure public key authentication is enabled
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PubkeyAuthentication'
    line: 'PubkeyAuthentication yes'

- name: Restrict SSH to local network (10.0.0.0/24)
  ansible.builtin.blockinfile:
    path: /etc/ssh/sshd_config
    marker: "# {mark} ANSIBLE LOCAL NETWORK SSH"
    block: |
      Match Address 10.0.0.0/24
          PermitRootLogin yes
          PasswordAuthentication no

# Disable DNS and GSSAPI to reduce attack surface and speed up login
- name: Disable DNS lookup
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?UseDNS'
    line: 'UseDNS no'

- name: Disable GSSAPI authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?GSSAPIAuthentication'
    line: 'GSSAPIAuthentication no'

- name: Restart SSH
  ansible.builtin.service:
    name: ssh
    state: restarted
