- name: Disable systemd-resolved
  ansible.builtin.systemd_service:
    name: systemd-resolved
    enabled: false

- name: Stop systemd-resolved
  ansible.builtin.systemd_service:
    name: systemd-resolved
    state: stopped

- name: Disable IPv6
  ansible.posix.sysctl:
    name: "{{ item }}"
    value: '1'
    state: present
    sysctl_file: /etc/sysctl.d/99-disable-ipv6.conf
    reload: yes
  loop:
    - net.ipv6.conf.all.disable_ipv6
    - net.ipv6.conf.default.disable_ipv6
    - net.ipv6.conf.lo.disable_ipv6

- name: Fix resolv.conf
  block:
    - name: Check if /etc/resolv.conf is a symlink
      ansible.builtin.stat:
        path: /etc/resolv.conf
      register: resolv_conf_stat

    - name: Remove /etc/resolv.conf if it is a symlink
      ansible.builtin.file:
        path: /etc/resolv.conf
        state: absent
      when: resolv_conf_stat.stat.islnk is defined and resolv_conf_stat.stat.islnk

    - name: Create static /etc/resolv.conf with public DNS
      ansible.builtin.copy:
        dest: /etc/resolv.conf
        content: |
            nameserver 193.17.47.1
            nameserver 185.43.135.1
        mode: '0644'
        owner: root
        group: root
