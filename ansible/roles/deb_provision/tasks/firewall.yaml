- name: Ensure security packages are installed
  ansible.builtin.apt:
    name: nftables
    state: present

- name: Apply nftables config
  template:
    src: ../templates/nftables.conf.j2
    dest: /etc/nftables.conf
  register: nft_config

- name: Reload nftables if config changed
  ansible.builtin.systemd:
    name: nftables
    state: reloaded
  when: nft_config.changed
