apiVersion: v1
kind: Service
metadata:
  name: dnsmasq-lb
  namespace: {{ .Release.Namespace }}
spec:
  loadBalancerIP: 10.0.0.153
  type: LoadBalancer
  ports:
    - name: dns-udp
      port: 53
      protocol: UDP
      targetPort: 53
    - name: dns-tcp
      port: 53
      protocol: TCP
      targetPort: 53
  selector:
    app: dnsmasq
