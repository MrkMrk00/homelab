DNS1:
  10.0.0.138
DNS2:
  193.17.47.1

dnsmasq:
  customDnsEntries:
    - "address=/cluster.local/10.0.0.230"
  
  # Allow traffic from any network interface
  customSettings:
    - "except-interface=nonexisting"

persistentVolumeClaim:
  enabled: false

virtualHost: "pihole.cluster.local"

ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - "pihole.cluster.local"

serviceDns:
  type: LoadBalancer

replicaCount: 1

nodeSelector:
  kubernetes.io/hostname: "kube-trixie-0"

persistentVolumeClaim:
  enabled: false
